name: nbs-v2

services:
  nextjs:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install --include=dev && npm run build && npm run start -- -p 3001"
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped
